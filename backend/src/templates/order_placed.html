<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body style="margin:0;padding:0;background:#f5f5f5;font-family:'Segoe UI',Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f5f5f5;padding:40px 0;">
    <tr><td align="center">
      <table width="560" cellpadding="0" cellspacing="0" style="background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08);">
        <tr><td style="background:linear-gradient(135deg,#FF6B35,#F7931E);padding:32px 40px;text-align:center;">
          <h1 style="color:#fff;margin:0;font-size:28px;font-weight:800;">onlyStuff</h1>
        </td></tr>
        <tr><td style="padding:40px;">
          <h2 style="color:#1a1a1a;font-size:22px;margin:0 0 16px;">New order received 📦</h2>
          <p style="color:#444;font-size:15px;line-height:1.6;margin:0 0 16px;">Hi {{sellerName}},</p>
          <p style="color:#444;font-size:15px;line-height:1.6;margin:0 0 24px;">You have a new order for <strong>{{listingTitle}}</strong>.</p>
          <table style="background:#f9f9f9;border-radius:8px;padding:20px;width:100%;box-sizing:border-box;" cellpadding="0" cellspacing="0">
            <tr><td style="padding:6px 0;color:#555;font-size:14px;">Quantity</td><td style="padding:6px 0;color:#111;font-size:14px;font-weight:600;text-align:right;">{{quantity}}</td></tr>
            <tr><td style="padding:6px 0;color:#555;font-size:14px;">Total</td><td style="padding:6px 0;color:#FF6B35;font-size:16px;font-weight:700;text-align:right;">₹{{totalPrice}}</td></tr>
          </table>
          <div style="text-align:center;margin:32px 0;">
            <a href="{{appUrl}}/sell/orders" style="background:linear-gradient(135deg,#FF6B35,#F7931E);color:#fff;padding:14px 32px;border-radius:8px;text-decoration:none;font-size:15px;font-weight:600;display:inline-block;">View Order</a>
          </div>
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
