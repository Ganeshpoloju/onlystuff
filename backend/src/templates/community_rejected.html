<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body style="margin:0;padding:0;background:#f5f5f5;font-family:'Segoe UI',Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f5f5f5;padding:40px 0;">
    <tr><td align="center">
      <table width="560" cellpadding="0" cellspacing="0" style="background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08);">
        <tr><td style="background:linear-gradient(135deg,#FF6B35,#F7931E);padding:32px 40px;text-align:center;">
          <h1 style="color:#fff;margin:0;font-size:28px;font-weight:800;">onlyStuff</h1>
        </td></tr>
        <tr><td style="padding:40px;">
          <h2 style="color:#1a1a1a;font-size:22px;margin:0 0 16px;">Community request update</h2>
          <p style="color:#444;font-size:15px;line-height:1.6;margin:0 0 16px;">Hi {{name}},</p>
          <p style="color:#444;font-size:15px;line-height:1.6;margin:0 0 16px;">We couldn't approve your request for <strong>{{communityName}}</strong> at this time.</p>
          <div style="background:#fff5f0;border-left:4px solid #FF6B35;padding:16px 20px;border-radius:4px;margin:0 0 24px;">
            <p style="color:#c0392b;margin:0;font-size:14px;">{{reason}}</p>
          </div>
          <p style="color:#444;font-size:15px;line-height:1.6;margin:0 0 24px;">You're welcome to resubmit with corrections. Reply to this email if you need help.</p>
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
