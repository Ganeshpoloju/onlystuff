<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"></head>
<body style="margin:0;padding:0;background:#f5f5f5;font-family:'Segoe UI',Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f5f5f5;padding:40px 0;">
    <tr><td align="center">
      <table width="560" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08);">
        <tr><td style="background:linear-gradient(135deg,#FF6B35,#F7931E);padding:32px 40px;text-align:center;">
          <h1 style="color:#fff;margin:0;font-size:28px;font-weight:800;letter-spacing:-0.5px;">onlyStuff</h1>
          <p style="color:rgba(255,255,255,0.85);margin:4px 0 0;font-size:13px;">your neighbourhood marketplace</p>
        </td></tr>
        <tr><td style="padding:40px;">
          <h2 style="color:#1a1a1a;font-size:22px;margin:0 0 16px;">You're verified! 🎉</h2>
          <p style="color:#444;font-size:15px;line-height:1.6;margin:0 0 16px;">Hi {{name}},</p>
          <p style="color:#444;font-size:15px;line-height:1.6;margin:0 0 24px;">Your identity has been verified and your onlyStuff account is now fully active. You can start buying and selling in your community right away.</p>
          <div style="text-align:center;margin:32px 0;">
            <a href="{{appUrl}}" style="background:linear-gradient(135deg,#FF6B35,#F7931E);color:#fff;padding:14px 32px;border-radius:8px;text-decoration:none;font-size:15px;font-weight:600;display:inline-block;">Explore onlyStuff</a>
          </div>
          <p style="color:#888;font-size:13px;line-height:1.5;margin:24px 0 0;border-top:1px solid #eee;padding-top:20px;">Questions? Just reply to this email. We're here to help.</p>
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
